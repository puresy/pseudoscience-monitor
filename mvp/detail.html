<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>伪科普监测系统 — 明细核查</title>
<style>
:root {
  --bg-primary: #0f1923;
  --bg-card: #1a2736;
  --bg-card-hover: #1e2f42;
  --border: #2a3f55;
  --text-primary: #e8ecf1;
  --text-secondary: #8899aa;
  --text-muted: #5a6b7c;
  --critical: #ef4444;
  --critical-bg: rgba(239,68,68,0.12);
  --high: #f97316;
  --high-bg: rgba(249,115,22,0.12);
  --medium: #eab308;
  --medium-bg: rgba(234,179,8,0.12);
  --none-sev: #6b7280;
  --none-sev-bg: rgba(107,114,128,0.12);
  --pseudo: #ef4444;
  --pseudo-bg: rgba(239,68,68,0.10);
  --debunk: #22c55e;
  --debunk-bg: rgba(34,197,94,0.10);
  --normal: #3b82f6;
  --normal-bg: rgba(59,130,246,0.10);
  --nonsci: #6b7280;
  --nonsci-bg: rgba(107,114,128,0.10);
  --accent: #3b82f6;
  --accent-bg: rgba(59,130,246,0.12);
  --llm: #a855f7;
  --llm-bg: rgba(168,85,247,0.12);
}
* { margin:0; padding:0; box-sizing:border-box; }
body {
  font-family: -apple-system, "PingFang SC", "Microsoft YaHei", "Helvetica Neue", sans-serif;
  background: var(--bg-primary);
  color: var(--text-primary);
  line-height: 1.6;
  min-height: 100vh;
}
.container { max-width: 1600px; margin: 0 auto; padding: 24px 20px; }

/* Header */
.header {
  text-align: center;
  padding: 36px 20px 28px;
  position: relative;
}
.header::after {
  content: '';
  position: absolute;
  bottom: 0; left: 10%; right: 10%;
  height: 1px;
  background: linear-gradient(90deg, transparent, var(--border), transparent);
}
.header h1 {
  font-size: 28px; font-weight: 700;
  background: linear-gradient(135deg, #60a5fa, #a78bfa, #f472b6);
  -webkit-background-clip: text; -webkit-text-fill-color: transparent;
  background-clip: text;
  letter-spacing: 2px;
}
.header .subtitle {
  color: var(--text-secondary); font-size: 14px; margin-top: 6px;
}
.back-link {
  position: absolute; left: 20px; top: 50%; transform: translateY(-50%);
  color: var(--accent); text-decoration: none; font-size: 14px;
  display: flex; align-items: center; gap: 4px;
}
.back-link:hover { text-decoration: underline; }

/* Stats bar */
.stats-bar {
  display: flex; gap: 12px; flex-wrap: wrap; margin: 20px 0;
  justify-content: center;
}
.stat-chip {
  display: inline-flex; align-items: center; gap: 6px;
  padding: 8px 18px; border-radius: 24px; font-size: 14px; font-weight: 600;
  border: 1px solid;
}
.stat-chip.pseudo { background: var(--pseudo-bg); color: var(--pseudo); border-color: rgba(239,68,68,0.25); }
.stat-chip.debunk { background: var(--debunk-bg); color: var(--debunk); border-color: rgba(34,197,94,0.25); }
.stat-chip.normal { background: var(--normal-bg); color: var(--normal); border-color: rgba(59,130,246,0.25); }
.stat-chip.nonsci { background: var(--nonsci-bg); color: var(--nonsci); border-color: rgba(107,114,128,0.25); }
.stat-chip .stat-num { font-size: 18px; font-weight: 800; }
.stat-chip .stat-pct { font-size: 12px; font-weight: 400; opacity: 0.8; }

/* Filters */
.filter-section {
  background: var(--bg-card);
  border: 1px solid var(--border);
  border-radius: 12px;
  padding: 16px 20px;
  margin-bottom: 16px;
  display: flex; gap: 16px; flex-wrap: wrap; align-items: center;
}
.filter-group { display: flex; gap: 6px; align-items: center; flex-wrap: wrap; }
.filter-label { font-size: 12px; color: var(--text-muted); font-weight: 600; text-transform: uppercase; margin-right: 4px; }
.filter-btn {
  padding: 5px 14px; border-radius: 18px; border: 1px solid var(--border);
  background: transparent; color: var(--text-secondary); font-size: 12px;
  cursor: pointer; transition: all 0.15s; font-family: inherit;
}
.filter-btn:hover { border-color: var(--accent); color: var(--accent); }
.filter-btn.active { background: var(--accent-bg); border-color: var(--accent); color: var(--accent); }
.filter-btn.ct-pseudo.active { background: var(--pseudo-bg); border-color: var(--pseudo); color: var(--pseudo); }
.filter-btn.ct-debunk.active { background: var(--debunk-bg); border-color: var(--debunk); color: var(--debunk); }
.filter-btn.ct-normal.active { background: var(--normal-bg); border-color: var(--normal); color: var(--normal); }
.filter-btn.ct-nonsci.active { background: var(--nonsci-bg); border-color: var(--nonsci); color: var(--nonsci); }
.filter-btn.sev-critical.active { background: var(--critical-bg); border-color: var(--critical); color: var(--critical); }
.filter-btn.sev-high.active { background: var(--high-bg); border-color: var(--high); color: var(--high); }
.filter-btn.sev-medium.active { background: var(--medium-bg); border-color: var(--medium); color: var(--medium); }

.search-input {
  flex: 1; min-width: 200px;
  padding: 6px 14px; border-radius: 18px; border: 1px solid var(--border);
  background: rgba(255,255,255,0.04); color: var(--text-primary); font-size: 13px;
  font-family: inherit; outline: none;
}
.search-input::placeholder { color: var(--text-muted); }
.search-input:focus { border-color: var(--accent); }

/* Sort bar */
.sort-bar {
  display: flex; gap: 8px; align-items: center; margin-bottom: 12px; flex-wrap: wrap;
}
.sort-btn {
  padding: 4px 12px; border-radius: 6px; border: 1px solid var(--border);
  background: transparent; color: var(--text-muted); font-size: 12px;
  cursor: pointer; font-family: inherit; transition: all 0.15s;
}
.sort-btn:hover { border-color: var(--text-secondary); color: var(--text-secondary); }
.sort-btn.active { background: var(--accent-bg); border-color: var(--accent); color: var(--accent); }
.result-count { font-size: 13px; color: var(--text-muted); margin-left: auto; }

/* Table */
.table-wrap {
  background: var(--bg-card);
  border: 1px solid var(--border);
  border-radius: 12px;
  overflow: hidden;
}
table {
  width: 100%; border-collapse: collapse; font-size: 13px;
}
thead th {
  padding: 12px 10px; text-align: left; font-size: 12px; font-weight: 600;
  color: var(--text-muted); text-transform: uppercase; letter-spacing: 0.5px;
  border-bottom: 1px solid var(--border);
  background: rgba(255,255,255,0.02);
  white-space: nowrap;
  position: sticky; top: 0; z-index: 10;
}
tbody tr {
  border-bottom: 1px solid rgba(255,255,255,0.03);
  cursor: pointer; transition: background 0.1s;
}
tbody tr:hover { background: var(--bg-card-hover); }
tbody tr.expanded { background: rgba(59,130,246,0.05); }
tbody td { padding: 10px 10px; vertical-align: top; }
.col-idx { width: 40px; text-align: center; color: var(--text-muted); font-size: 12px; }
.col-user { width: 120px; color: var(--accent); font-weight: 500; white-space: nowrap; overflow: hidden; text-overflow: ellipsis; max-width: 120px; }
.col-text { max-width: 300px; color: var(--text-secondary); position: relative; }
.col-text .text-truncated {
  display: -webkit-box; -webkit-line-clamp: 2; -webkit-box-orient: vertical;
  overflow: hidden; line-height: 1.5;
}
.col-text .text-full { display: none; }

/* Badges */
.ct-badge, .sev-badge {
  display: inline-block; padding: 2px 10px; border-radius: 10px;
  font-size: 11px; font-weight: 700; white-space: nowrap;
}
.ct-badge.PSEUDOSCIENCE { background: var(--pseudo-bg); color: var(--pseudo); }
.ct-badge.DEBUNKING { background: var(--debunk-bg); color: var(--debunk); }
.ct-badge.NORMAL_SCIENCE { background: var(--normal-bg); color: var(--normal); }
.ct-badge.NON_SCIENCE { background: var(--nonsci-bg); color: var(--nonsci); }
.sev-badge.CRITICAL { background: var(--critical-bg); color: var(--critical); }
.sev-badge.HIGH { background: var(--high-bg); color: var(--high); }
.sev-badge.MEDIUM { background: var(--medium-bg); color: var(--medium); }
.sev-badge.NONE { background: var(--none-sev-bg); color: var(--none-sev); }

.col-rules { font-size: 11px; color: var(--text-muted); max-width: 160px; }
.col-llm { font-size: 11px; max-width: 120px; }
.llm-tag { color: var(--llm); font-weight: 600; }
.col-score { text-align: center; font-weight: 700; font-size: 14px; white-space: nowrap; }

/* Detail row */
.detail-row { display: none; }
.detail-row.visible { display: table-row; }
.detail-row td { padding: 0; }
.detail-content {
  padding: 20px 24px;
  background: rgba(0,0,0,0.15);
  border-top: 1px solid var(--border);
}
.detail-grid {
  display: grid; grid-template-columns: 1fr 1fr; gap: 16px;
}
@media (max-width: 900px) { .detail-grid { grid-template-columns: 1fr; } }
.detail-block {
  background: rgba(255,255,255,0.02);
  border: 1px solid var(--border);
  border-radius: 8px;
  padding: 14px;
}
.detail-block h4 {
  font-size: 13px; font-weight: 600; margin-bottom: 8px;
  color: var(--text-primary);
  display: flex; align-items: center; gap: 6px;
}
.detail-block .full-text-content {
  font-size: 13px; line-height: 1.8; color: var(--text-primary);
  background: rgba(255,255,255,0.03); padding: 12px; border-radius: 6px;
  word-break: break-all; max-height: 300px; overflow-y: auto;
}
.kw-hit {
  display: inline-block; padding: 1px 8px; border-radius: 4px; margin: 2px;
  font-size: 11px; background: rgba(234,179,8,0.15); color: var(--medium);
}
.rule-item {
  padding: 6px 0; border-bottom: 1px solid rgba(255,255,255,0.03);
  font-size: 12px;
}
.rule-item:last-child { border-bottom: none; }
.rule-id { color: var(--accent); font-weight: 700; }
.llm-reasoning {
  background: rgba(168,85,247,0.06);
  border: 1px solid rgba(168,85,247,0.15);
  border-radius: 6px; padding: 10px; font-size: 12px;
  color: var(--text-secondary); line-height: 1.6; margin-top: 8px;
}
.flip-indicator {
  display: inline-flex; align-items: center; gap: 4px;
  padding: 2px 8px; border-radius: 4px; font-size: 11px; font-weight: 600;
  background: var(--llm-bg); color: var(--llm);
}
.meta-pills { display: flex; flex-wrap: wrap; gap: 6px; margin-top: 8px; }
.meta-pill {
  padding: 2px 10px; border-radius: 6px; font-size: 11px;
  background: rgba(255,255,255,0.05); color: var(--text-muted);
}

/* Loading / Error */
.loading-state {
  text-align: center; padding: 60px 20px; color: var(--text-muted);
}
.loading-state .spinner {
  display: inline-block; width: 32px; height: 32px;
  border: 3px solid var(--border);
  border-top-color: var(--accent);
  border-radius: 50%;
  animation: spin 0.8s linear infinite;
  margin-bottom: 12px;
}
@keyframes spin { to { transform: rotate(360deg); } }
.error-state {
  text-align: center; padding: 40px 20px; color: var(--critical);
}

/* harm badge */
.harm-badge {
  display: inline-block; padding: 1px 6px; border-radius: 4px; font-size: 10px; font-weight: 600;
  margin-left: 4px;
}
.harm-badge.fraud { background: rgba(239,68,68,0.15); color: var(--critical); }
.harm-badge.reputation { background: rgba(249,115,22,0.15); color: var(--high); }
.harm-badge.cult { background: rgba(168,85,247,0.15); color: var(--llm); }

footer {
  text-align: center;
  padding: 30px 20px;
  color: var(--text-muted);
  font-size: 12px;
  border-top: 1px solid var(--border);
  margin-top: 40px;
}
</style>
</head>
<body>

<div class="header">
  <a href="dashboard.html" class="back-link">← 返回总览</a>
  <h1>明细核查 — 全量逐条分析</h1>
  <div class="subtitle" id="subtitle">v3.1引擎(五修复版) · 加载中…</div>
</div>

<div class="container">

<!-- Stats -->
<div class="stats-bar" id="statsBar"></div>

<!-- Filters -->
<div class="filter-section">
  <div class="filter-group">
    <span class="filter-label">内容分类</span>
    <button class="filter-btn active" onclick="filterCT('all',this)">全部</button>
    <button class="filter-btn ct-pseudo" onclick="filterCT('PSEUDOSCIENCE',this)">🔴 伪科普</button>
    <button class="filter-btn ct-debunk" onclick="filterCT('DEBUNKING',this)">🟢 辟谣</button>
    <button class="filter-btn ct-normal" onclick="filterCT('NORMAL_SCIENCE',this)">🔵 正常科普</button>
    <button class="filter-btn ct-nonsci" onclick="filterCT('NON_SCIENCE',this)">⚪ 非科学</button>
  </div>
  <div class="filter-group">
    <span class="filter-label">风险等级</span>
    <button class="filter-btn active" onclick="filterSev('all',this)">全部</button>
    <button class="filter-btn sev-critical" onclick="filterSev('CRITICAL',this)">CRITICAL</button>
    <button class="filter-btn sev-high" onclick="filterSev('HIGH',this)">HIGH</button>
    <button class="filter-btn sev-medium" onclick="filterSev('MEDIUM',this)">MEDIUM</button>
  </div>
  <div class="filter-group">
    <span class="filter-label">危害主线</span>
    <button class="filter-btn active" onclick="filterHarm('all',this)">全部</button>
    <button class="filter-btn sev-critical" onclick="filterHarm('fraud',this)">欺诈</button>
    <button class="filter-btn sev-high" onclick="filterHarm('reputation',this)">风评攻击</button>
    <button class="filter-btn" onclick="filterHarm('cult',this)" style="color:var(--llm);border-color:rgba(168,85,247,0.2)">邪教属性</button>
  </div>
  <input type="text" class="search-input" id="searchInput" placeholder="🔍 搜索关键词、用户名..." oninput="applyFilters()">
</div>

<!-- Sort -->
<div class="sort-bar">
  <span class="filter-label">排序</span>
  <button class="sort-btn active" onclick="sortBy('risk_score',this)">风险得分 ↓</button>
  <button class="sort-btn" onclick="sortBy('publish_time',this)">时间 ↓</button>
  <button class="sort-btn" onclick="sortBy('spread',this)">传播量 ↓</button>
  <button class="sort-btn" onclick="sortBy('idx',this)">序号 ↑</button>
  <span class="result-count" id="resultCount"></span>
</div>

<!-- Table -->
<div class="table-wrap">
  <div class="loading-state" id="loadingState">
    <div class="spinner"></div>
    <div>正在加载分析数据…</div>
  </div>
  <table style="display:none" id="dataTable">
    <thead>
      <tr>
        <th>#</th>
        <th>用户名</th>
        <th>原文</th>
        <th>内容分类</th>
        <th>风险等级</th>
        <th>危害</th>
        <th>触发规则</th>
        <th>LLM判断</th>
        <th>风险得分</th>
      </tr>
    </thead>
    <tbody id="tableBody"></tbody>
  </table>
</div>

</div>

<footer id="footer">伪科普监测系统 v3.1(五修复版) · 数据加载中…</footer>

<script>
// ── State ──
let DATA = [];
let currentCT = 'all';
let currentSev = 'all';
let currentHarm = 'all';
let currentSort = 'risk_score';

const CT_LABELS = {PSEUDOSCIENCE:'伪科普/谣言', DEBUNKING:'辟谣内容', NORMAL_SCIENCE:'正常科普', NON_SCIENCE:'非科学内容'};
const HARM_LABELS = {fraud:'欺诈', reputation:'风评攻击', cult:'邪教属性'};

// ── Data loading ──
async function loadData() {
  try {
    const resp = await fetch('data/analysis_v3.1_2026-05-06_final.jsonl');
    if (!resp.ok) throw new Error(`HTTP ${resp.status}`);
    const text = await resp.text();
    const lines = text.trim().split('\n').filter(l => l.trim());
    DATA = lines.map((line, i) => flattenRecord(JSON.parse(line), i + 1));
    document.getElementById('loadingState').style.display = 'none';
    document.getElementById('dataTable').style.display = '';
    document.getElementById('subtitle').textContent = `v3.1引擎(五修复版) · 2026-05-06 · ${DATA.length}条微博数据 · content_type + severity + 危害主线 三层分类`;
    document.getElementById('footer').textContent = `伪科普监测系统 v3.1(五修复版) 明细核查 · 2026-05-06 · 数据 ${DATA.length}条 · LLM: 小米mimo-v2-pro · 公开辟谣平台`;
    initStats();
    applyFilters();
  } catch (e) {
    document.getElementById('loadingState').innerHTML = `<div class="error-state">⚠️ 数据加载失败: ${escHtml(e.message)}<br><small>请确认 data/analysis_v3.1_2026-05-06_final.jsonl 存在</small></div>`;
  }
}

function flattenRecord(d, idx) {
  const a = d.analysis || {};
  // Flatten: top-level fields + analysis fields at root level
  return {
    idx,
    username: d.username || '',
    user_id: d.user_id || '',
    text: d.text || '',
    publish_time: d.publish_time || '',
    reposts_count: d.reposts_count || 0,
    comments_count: d.comments_count || 0,
    attitudes_count: d.attitudes_count || 0,
    followers_count: d.followers_count || 0,
    verified: d.verified || false,
    verified_type: d.verified_type || 0,
    source_url: d.source_url || '',
    keyword: d.keyword || '',
    // analysis fields
    content_type: a.content_type || 'NON_SCIENCE',
    severity: a.severity || 'NONE',
    risk_score: a.risk_score || 0,
    science_keywords: a.science_keywords || [],
    is_debunking: a.is_debunking || false,
    debunking_confidence: a.debunking_confidence || 0,
    keyword_stats: a.keyword_stats || null,
    triggered_rules: a.triggered_rules || [],
    kb_matches: a.kb_matches || [],
    rule_severity: a.rule_severity || 'NONE',
    classification: a.classification || {},
    harm_line: a.harm_line || 'none',
    harm_evidence: a.harm_evidence || [],
    llm_analysis: a.llm_analysis || null,
    llm_flipped: a.llm_flipped || false,
    llm_flip_direction: a.llm_flip_direction || '',
    requires_review: a.requires_review || false,
  };
}

// ── Stats bar ──
function initStats() {
  const counts = {};
  DATA.forEach(d => { counts[d.content_type] = (counts[d.content_type]||0)+1; });
  const total = DATA.length;
  const bar = document.getElementById('statsBar');
  const order = [
    {k:'PSEUDOSCIENCE',cls:'pseudo',icon:'🔴'},
    {k:'DEBUNKING',cls:'debunk',icon:'🟢'},
    {k:'NORMAL_SCIENCE',cls:'normal',icon:'🔵'},
    {k:'NON_SCIENCE',cls:'nonsci',icon:'⚪'}
  ];
  bar.innerHTML = order.map(o => {
    const c = counts[o.k]||0;
    return `<div class="stat-chip ${o.cls}">${o.icon} ${CT_LABELS[o.k]} <span class="stat-num">${c}</span><span class="stat-pct">(${(c/total*100).toFixed(1)}%)</span></div>`;
  }).join('');
}

// ── Utilities ──
function escHtml(s) {
  const d = document.createElement('div');
  d.textContent = s||'';
  return d.innerHTML;
}

function truncate(s, n) {
  return s && s.length > n ? s.substring(0, n) + '…' : (s||'');
}

// ── Render ──
function renderRules(rules) {
  if (!rules || !rules.length) return '<span style="color:var(--text-muted)">—</span>';
  return rules.map(r => `<span class="rule-id">${r.rule_id}</span> ${escHtml(r.name)}`).join('<br>');
}

function renderLLM(d) {
  if (!d.llm_analysis) return '<span style="color:var(--text-muted)">未调用</span>';
  const la = d.llm_analysis;
  let html = `<span class="llm-tag">${escHtml(la.category||la.content_type||'')}</span>`;
  if (d.llm_flipped) {
    const dir = d.llm_flip_direction === 'downgrade' ? '⬇️降级' : d.llm_flip_direction === 'upgrade' ? '⬆️升级' : '🔄重分类';
    html += `<br><span class="flip-indicator">${dir}</span>`;
  }
  return html;
}

function renderHarm(d) {
  if (!d.harm_line || d.harm_line === 'none') return '<span style="color:var(--text-muted)">—</span>';
  const h = d.harm_line;
  const cls = h === 'fraud' ? 'fraud' : h === 'reputation' ? 'reputation' : h === 'cult' ? 'cult' : '';
  return `<span class="harm-badge ${cls}">${HARM_LABELS[h]||h}</span>`;
}

function renderRow(d) {
  const spread = (d.reposts_count||0)+(d.comments_count||0)+(d.attitudes_count||0);
  const scoreColor = d.risk_score >= 8 ? 'var(--critical)' : d.risk_score >= 5 ? 'var(--high)' : d.risk_score >= 3 ? 'var(--medium)' : 'var(--text-muted)';
  return `<tr onclick="toggleDetail(${d.idx})" id="row-${d.idx}">
    <td class="col-idx">${d.idx}</td>
    <td class="col-user" title="${escHtml(d.username)}">${escHtml(d.username)}</td>
    <td class="col-text"><div class="text-truncated">${escHtml(truncate(d.text,100))}</div></td>
    <td><span class="ct-badge ${d.content_type}">${CT_LABELS[d.content_type]||d.content_type}</span></td>
    <td><span class="sev-badge ${d.severity}">${d.severity}</span></td>
    <td>${renderHarm(d)}</td>
    <td class="col-rules">${renderRules(d.triggered_rules)}</td>
    <td class="col-llm">${renderLLM(d)}</td>
    <td class="col-score" style="color:${scoreColor}">${d.risk_score.toFixed(1)}</td>
  </tr>
  <tr class="detail-row" id="detail-${d.idx}"><td colspan="9">${renderDetail(d)}</td></tr>`;
}

function renderDetail(d) {
  const la = d.llm_analysis;
  // Keyword hits
  let kwHtml = '';
  if (d.keyword_stats) {
    const cats = ['fear','urgency','absolute','fake_authority','fake_testimony','science_abuse','exaggeration','marketing','food_clash'];
    const catNames = {fear:'恐惧词',urgency:'紧迫感',absolute:'绝对化',fake_authority:'虚假权威',fake_testimony:'虚假见证',science_abuse:'科学滥用',exaggeration:'夸大效能',marketing:'营销词',food_clash:'食品相克'};
    cats.forEach(c => {
      const s = d.keyword_stats[c];
      if (s && s.hits && s.hits.length) {
        kwHtml += `<div style="margin-bottom:4px"><strong style="color:var(--text-secondary)">${catNames[c]}:</strong> `;
        kwHtml += s.hits.map(h => `<span class="kw-hit">${escHtml(h)}</span>`).join(' ');
        kwHtml += '</div>';
      }
    });
  }
  if (!kwHtml) kwHtml = '<span style="color:var(--text-muted)">无命中</span>';

  // Rules detail
  let rulesHtml = '';
  if (d.triggered_rules && d.triggered_rules.length) {
    rulesHtml = d.triggered_rules.map(r =>
      `<div class="rule-item"><span class="rule-id">${r.rule_id}</span> <strong>${escHtml(r.name)}</strong> [${r.severity}] 置信度:${r.confidence}<br><span style="color:var(--text-muted)">${escHtml(r.detail)}</span></div>`
    ).join('');
  } else {
    rulesHtml = '<span style="color:var(--text-muted)">无规则触发</span>';
  }

  // LLM detail
  let llmHtml = '';
  if (la) {
    llmHtml = `<div style="font-size:12px;">
      <div><strong>content_type:</strong> ${escHtml(la.content_type||'')}</div>
      <div><strong>severity:</strong> ${escHtml(la.severity||'')}</div>
      <div><strong>category:</strong> ${escHtml(la.category||'')}</div>
      <div><strong>confidence:</strong> ${la.confidence||0}</div>
      <div><strong>is_debunking:</strong> ${la.is_debunking?'✅ 是':'❌ 否'}</div>
      ${la.harm_line && la.harm_line !== 'none' ? `<div><strong>harm_line:</strong> ${escHtml(la.harm_line)}</div>` : ''}
    </div>`;
    if (la.reasoning) {
      llmHtml += `<div class="llm-reasoning">🤖 ${escHtml(la.reasoning)}</div>`;
    }
    if (d.llm_flipped) {
      const arrow = d.llm_flip_direction === 'downgrade' ? '⬇️' : d.llm_flip_direction === 'upgrade' ? '⬆️' : '🔄';
      llmHtml += `<div style="margin-top:6px"><span class="flip-indicator">${arrow} LLM翻转: ${d.llm_flip_direction}</span></div>`;
    }
  } else {
    llmHtml = '<span style="color:var(--text-muted)">未调用LLM（规则引擎判定无需二次确认）</span>';
  }

  // Harm evidence
  let harmHtml = '';
  if (d.harm_evidence && d.harm_evidence.length) {
    harmHtml = `<div class="detail-block" style="grid-column:1/-1">
      <h4>⚠️ 危害证据</h4>
      <div style="font-size:12px;line-height:1.6;color:var(--text-secondary)">${escHtml(d.harm_evidence.map(e => typeof e === 'string' ? e : JSON.stringify(e)).join('；'))}</div>
    </div>`;
  }

  // Meta
  const spread = (d.reposts_count||0)+(d.comments_count||0)+(d.attitudes_count||0);
  const cls = d.classification || {};

  return `<div class="detail-content">
    <div class="detail-grid">
      <div class="detail-block" style="grid-column:1/-1">
        <h4>📝 完整原文</h4>
        <div class="full-text-content">${escHtml(d.text)}</div>
        <div class="meta-pills">
          <span class="meta-pill">🔑 搜索词: ${escHtml(d.keyword)}</span>
          <span class="meta-pill">📅 ${escHtml(d.publish_time)}</span>
          <span class="meta-pill">👥 粉丝: ${(d.followers_count||0).toLocaleString()}</span>
          <span class="meta-pill">🔄 转发: ${d.reposts_count||0}</span>
          <span class="meta-pill">💬 评论: ${d.comments_count||0}</span>
          <span class="meta-pill">👍 点赞: ${d.attitudes_count||0}</span>
          <span class="meta-pill">📊 传播量: ${spread.toLocaleString()}</span>
          ${d.verified?'<span class="meta-pill" style="color:var(--accent)">✅ 认证账号</span>':''}
          ${cls.category_cn?`<span class="meta-pill">📂 ${escHtml(cls.category_cn)}${cls.subtype_cn?' / '+escHtml(cls.subtype_cn):''}</span>`:''}
          ${cls.reason?`<span class="meta-pill">💡 ${escHtml(cls.reason)}</span>`:''}
          ${d.is_debunking?`<span class="meta-pill" style="color:var(--debunk)">🛡️ 辟谣帖 (conf: ${d.debunking_confidence})</span>`:''}
          ${d.source_url?`<a href="${escHtml(d.source_url)}" target="_blank" class="meta-pill" style="color:var(--accent);text-decoration:none;">🔗 原文链接</a>`:''}
        </div>
      </div>
      <div class="detail-block">
        <h4>🔍 关键词命中</h4>
        ${kwHtml}
        <div style="margin-top:8px;font-size:11px;color:var(--text-muted)">
          涉科关键词: ${d.science_keywords?d.science_keywords.map(k=>`<span class="kw-hit" style="background:rgba(59,130,246,0.1);color:var(--accent)">${escHtml(k)}</span>`).join(' '):'—'}
        </div>
      </div>
      <div class="detail-block">
        <h4>📏 规则触发详情</h4>
        ${rulesHtml}
        <div style="margin-top:8px;font-size:11px;color:var(--text-muted)">
          规则引擎 severity: <strong>${d.rule_severity||'—'}</strong>
        </div>
      </div>
      ${harmHtml}
      <div class="detail-block" style="grid-column:1/-1">
        <h4>🤖 LLM完整判断</h4>
        ${llmHtml}
      </div>
    </div>
  </div>`;
}

// ── Interactions ──
function toggleDetail(idx) {
  const row = document.getElementById('row-'+idx);
  const detail = document.getElementById('detail-'+idx);
  if (!row || !detail) return;
  const isOpen = detail.classList.contains('visible');
  document.querySelectorAll('.detail-row.visible').forEach(d => d.classList.remove('visible'));
  document.querySelectorAll('tbody tr.expanded').forEach(r => r.classList.remove('expanded'));
  if (!isOpen) {
    detail.classList.add('visible');
    row.classList.add('expanded');
  }
}

function filterCT(ct, btn) {
  currentCT = ct;
  document.querySelectorAll('.filter-group:first-child .filter-btn').forEach(b => b.classList.remove('active'));
  btn.classList.add('active');
  applyFilters();
}

function filterSev(sev, btn) {
  currentSev = sev;
  document.querySelectorAll('.filter-group:nth-child(2) .filter-btn').forEach(b => b.classList.remove('active'));
  btn.classList.add('active');
  applyFilters();
}

function filterHarm(harm, btn) {
  currentHarm = harm;
  // third filter-group
  document.querySelectorAll('.filter-group:nth-child(3) .filter-btn').forEach(b => b.classList.remove('active'));
  btn.classList.add('active');
  applyFilters();
}

function sortBy(field, btn) {
  currentSort = field;
  document.querySelectorAll('.sort-btn').forEach(b => b.classList.remove('active'));
  btn.classList.add('active');
  applyFilters();
}

function applyFilters() {
  if (!DATA.length) return;
  const query = (document.getElementById('searchInput').value||'').toLowerCase();
  let filtered = DATA.filter(d => {
    if (currentCT !== 'all' && d.content_type !== currentCT) return false;
    if (currentSev !== 'all' && d.severity !== currentSev) return false;
    if (currentHarm !== 'all' && d.harm_line !== currentHarm) return false;
    if (query) {
      const haystack = ((d.text||'')+(d.username||'')).toLowerCase();
      if (!haystack.includes(query)) return false;
    }
    return true;
  });

  if (currentSort === 'risk_score') {
    filtered.sort((a,b) => b.risk_score - a.risk_score);
  } else if (currentSort === 'publish_time') {
    filtered.sort((a,b) => (b.publish_time||'').localeCompare(a.publish_time||''));
  } else if (currentSort === 'spread') {
    const sp = d => (d.reposts_count||0)+(d.comments_count||0)+(d.attitudes_count||0);
    filtered.sort((a,b) => sp(b) - sp(a));
  } else {
    filtered.sort((a,b) => a.idx - b.idx);
  }

  document.getElementById('tableBody').innerHTML = filtered.map(renderRow).join('');
  document.getElementById('resultCount').textContent = `显示 ${filtered.length} / ${DATA.length} 条`;
}

// ── Bootstrap ──
loadData();
</script>
</body>
</html>
