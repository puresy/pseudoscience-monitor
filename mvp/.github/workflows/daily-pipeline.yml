name: 伪科普监测 - 每日采集分析

on:
  # 每天北京时间凌晨3点（UTC 19:00，避开高峰享0.8x折扣）
  schedule:
    - cron: '0 19 * * *'

  # 手动触发
  workflow_dispatch:
    inputs:
      source:
        description: '数据来源'
        required: true
        default: 'weibo'
        type: choice
        options:
          - weibo
          - piyao
          - all
      limit:
        description: '每个关键词采集条数'
        required: false
        default: '30'
        type: string

env:
  PYTHON_VERSION: '3.11'

jobs:
  collect-and-analyze:
    runs-on: ubuntu-latest
    timeout-minutes: 30

    steps:
      - name: 检出代码
        uses: actions/checkout@v4

      - name: 设置 Python
        uses: actions/setup-python@v5
        with:
          python-version: ${{ env.PYTHON_VERSION }}
          cache: 'pip'

      - name: 安装依赖
        run: |
          pip install --upgrade pip
          pip install -r requirements.txt

      - name: 运行采集+分析
        working-directory: ./mvp
        env:
          XIAOMI_API_KEY: ${{ secrets.XIAOMI_API_KEY }}
        run: |
          SOURCE="${{ github.event.inputs.source || 'weibo' }}"
          LIMIT="${{ github.event.inputs.limit || '30' }}"
          DATE=$(TZ=Asia/Shanghai date +%Y-%m-%d)

          echo "📊 开始采集: source=$SOURCE, date=$DATE, limit=$LIMIT"

          python run_pipeline.py \
            --source "$SOURCE" \
            --date "$DATE" \
            --limit "$LIMIT" \
            --config config.yaml

      - name: 生成看板数据摘要
        working-directory: ./mvp
        run: |
          DATE=$(TZ=Asia/Shanghai date +%Y-%m-%d)
          ANALYSIS_FILE="data/analysis_${DATE}.jsonl"

          if [ -f "$ANALYSIS_FILE" ]; then
            echo "📊 分析结果统计:"
            python3 -c "
          import json
          stats = {'total':0, 'categories':{}, 'severity':{}}
          with open('$ANALYSIS_FILE') as f:
              for line in f:
                  d = json.loads(line)
                  a = d.get('analysis', {})
                  stats['total'] += 1
                  llm = a.get('llm_analysis', {})
                  cat = llm.get('category', '未分析') if isinstance(llm, dict) else '未分析'
                  stats['categories'][cat] = stats['categories'].get(cat,0) + 1
                  sev = a.get('severity', 'NONE')
                  stats['severity'][sev] = stats['severity'].get(sev,0) + 1

          print(f'总量: {stats[\"total\"]}')
          print('分类:')
          for k,v in sorted(stats['categories'].items(), key=lambda x:-x[1]):
              print(f'  {k}: {v}')
          print('严重度:')
          for k,v in sorted(stats['severity'].items(), key=lambda x:-x[1]):
              if v > 0: print(f'  {k}: {v}')
          "
          else
            echo "⚠️ 分析文件不存在: $ANALYSIS_FILE"
          fi

      - name: 提交结果
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"

          DATE=$(TZ=Asia/Shanghai date +%Y-%m-%d)

          # 添加新数据文件
          git add mvp/data/*.jsonl

          # 检查是否有变更
          if git diff --cached --quiet; then
            echo "✅ 没有新数据需要提交"
          else
            git commit -m "📊 每日采集 $DATE [skip ci]"
            git push
            echo "✅ 数据已提交"
          fi

      - name: 上传分析结果
        uses: actions/upload-artifact@v4
        with:
          name: analysis-${{ github.run_number }}
          path: mvp/data/analysis_*.jsonl
          retention-days: 30

  # 可选：每周日更新知识库
  update-kb:
    if: github.event.schedule == '0 19 * * 0' || github.event.inputs.source == 'all'
    runs-on: ubuntu-latest
    needs: collect-and-analyze

    steps:
      - name: 检出代码
        uses: actions/checkout@v4

      - name: 设置 Python
        uses: actions/setup-python@v5
        with:
          python-version: ${{ env.PYTHON_VERSION }}

      - name: 安装依赖
        run: pip install requests pyyaml beautifulsoup4

      - name: 更新辟谣知识库
        working-directory: ./mvp
        run: |
          echo "📚 更新辟谣知识库..."
          python run_pipeline.py --source piyao --max-pages 10

      - name: 提交知识库更新
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"

          git add mvp/data/rumor_knowledge_base.json mvp/data/piyao_*.jsonl

          if git diff --cached --quiet; then
            echo "✅ 知识库无更新"
          else
            git commit -m "📚 更新辟谣知识库 [skip ci]"
            git push
          fi
